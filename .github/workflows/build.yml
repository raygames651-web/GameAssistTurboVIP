name: Build Android APK
on:
  push:
    branches: [ main, principal ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build APK
        run: |
          cd GameAssistTurbo
          npm install
          npm run build
          npx cap sync android
          cd android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GameAssistTurboVIP
          path: GameAssistTurbo/android/app/build/outputs/apk/debug/app-debug.apk
